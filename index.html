<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식회사 제니트리 코스닥 상장 기념 만찬회</title>
    <style>
        /* 깔끔한 폰트 적용 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc; /* 부드러운 배경색 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 초대장 카드 스타일 */
        .invitation-card {
            background: white;
            width: 100%;
            max-width: 450px; /* 모바일 화면에 최적화된 크기 */
            padding: 50px 30px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
        }

        /* 상단 에메랄드색 영문 타이틀 */
        .top-notice {
            font-size: 13px;
            color: #0b8484;
            letter-spacing: 3px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        /* 주식회사 제니트리 (갈색 톤) */
        .company-name {
            font-size: 18px;
            color: #a95e1c;
            font-weight: 700;
            margin-bottom: 12px;
        }

        /* 코스닥 상장 기념 임직원 만찬회 (크고 굵게) */
        .main-title {
            font-size: 28px;
            color: #1e293b;
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
        }

        /* 초대합니다 */
        .sub-title {
            font-size: 16px;
            color: #64748b;
            letter-spacing: 6px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* ★ 로고 이미지 영역 */
        .logo-box {
            width: 100%;
            max-width: 160px;
            margin: 40px auto;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 하단 감사의 글 (에메랄드 톤) */
        .bottom-notice {
            font-size: 19px;
            color: #0b8484;
            font-weight: 700;
            line-height: 1.5;
            margin-top: 40px;
            word-break: keep-all; /* 글자가 어색하게 잘리지 않도록 설정 */
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <div class="top-notice">Notice of Kosdaq Listing</div>
        
        <div class="company-name">주식회사 제니트리</div>
        
        <div class="main-title">
            코스닥 상장 기념<br>임직원 만찬회
        </div>
        
        <div class="sub-title">초대합니다</div>
        
        <div class="logo-box">
            <img src="./janytree_logo.png.ico" alt="Janytree Company Logo">
        </div>
        
        <div class="bottom-notice">
            함께 이룬 상장,<br>감사의 자리에 초대합니다.
        </div>
    </div>

</body>
</html>
